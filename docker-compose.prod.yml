# Production compose overlay.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Expects environment variables set in a .env file next to this file:
#   POSTGRES_PASSWORD=...
#   JWT_SECRET=...
#   PUBLIC_URL=https://ops.yourdomain.co.za
#   CORS_ORIGINS=https://ops.yourdomain.co.za
#
# Includes nightly Postgres backup to ./backups/.

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
    ports: !reset []   # don't expose Postgres on the public internet
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://brightsolar:${POSTGRES_PASSWORD}@db:5432/brightsolar
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required in .env (use `openssl rand -hex 32`)}
      ENV: production
    ports: !override
      - "127.0.0.1:8000:8000"   # only reachable locally by the reverse proxy
    volumes:
      - ./backend/app:/app/app
      - uploads_data:/app/uploads
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000  # no --reload in prod

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  pgadmin: !reset null   # disabled in prod

  # Nightly pg_dump to ./backups/YYYY-MM-DD.sql.gz, keep last 30
  backup:
    image: postgres:16-alpine
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache tzdata >/dev/null 2>&1 || true
        while true; do
          STAMP=$$(date +%Y-%m-%d)
          echo "[backup] dumping brightsolar → /backups/$${STAMP}.sql.gz"
          pg_dump -h db -U brightsolar -d brightsolar | gzip > /backups/$${STAMP}.sql.gz && \
            echo "[backup] ok" || echo "[backup] FAILED"
          # prune anything older than 30 days
          find /backups -name '*.sql.gz' -mtime +30 -delete 2>/dev/null || true
          # sleep until 02:00 tomorrow
          NOW=$$(date +%s); NEXT=$$(date -d "tomorrow 02:00" +%s 2>/dev/null || date +%s -d "+1 day")
          SLEEP=$$(( NEXT - NOW ))
          [ $$SLEEP -lt 60 ] && SLEEP=86400
          echo "[backup] sleeping $${SLEEP}s until next run"
          sleep $$SLEEP
        done
    restart: unless-stopped
