services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brightsolar
      POSTGRES_PASSWORD: brightsolar
      POSTGRES_DB: brightsolar
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brightsolar -d brightsolar"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://brightsolar:brightsolar@db:5432/brightsolar
      CORS_ORIGINS: http://localhost:3000
      CORS_ORIGIN_REGEX: 'http://(localhost|127\.0\.0\.1):\d+'
      ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@brightsolar.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  db_data:
  uploads_data:
